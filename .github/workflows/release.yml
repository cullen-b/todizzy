name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  build:
    runs-on: macos-14   # Apple Silicon runner

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build ARM (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build Intel (Rosetta / older Macs)
        run: |
          SDKROOT=$(xcrun --sdk macosx --show-sdk-path) \
          cargo build --release --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/todizzy \
            target/x86_64-apple-darwin/release/todizzy \
            -output todizzy-universal
          file todizzy-universal   # confirm fat binary

      - name: Bundle .app
        run: |
          mkdir -p Todizzy.app/Contents/MacOS
          mkdir -p Todizzy.app/Contents/Resources
          cp todizzy-universal Todizzy.app/Contents/MacOS/todizzy
          cp Info.plist Todizzy.app/Contents/

      - name: Zip
        run: zip -r Todizzy.zip Todizzy.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Todizzy.zip
          generate_release_notes: true
